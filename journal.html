<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link 
    rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css"> 

</head>
<body class="journal-page">
    <div class="journal-main">
    <header class="header">
  <div class="container">
    <a href="index.html" class="logo">Madar<span>.</span></a>
    <nav class="nav">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="tasks.html">To-Do</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="prayer.html">Tracker</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
        <a class="fas fa-user"></a>
        <div class="menu-toggle" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>
  </div>
</header>

<div class="journal-wrapper" style="margin-top: 120px;"> <div class="container-fluid text-center mb-5">
        <h1 class="journal-title">Journal</h1>
        <p id="Quotes" class="quote-text"></p>
    </div>
</div>
     
        <div class="controls">
            <div class="controls-container">

                <input 
                type="text"
                id="searchInput"
                placeholder="Search.."
                class="search-input"
                />

                <div class="filter-group">
                    <select id="filterSelect" class="filter-select">
                        <option value="all">All Notes</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="ideas">Ideas</option>
                        <option value="reminders">Reminders</option>
                    </select>
                    <button id="addNoteBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
            </div>
        </div>
        <div id="notesContainer" class="notes-grid">

        </div>

        <div id="emptyState" class="empty-state">
            <!-- <i class="fas fa-notes-medical"></i> -->
            <img src="img/diary.png" width="200" class="mb-3 opacity-50">
            <h3>No Notes</h3>
            <p>Start recording your daily journey now.</p>
        </div>
        
        <div id="addNoteModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title">New Journal</h3>
                    <button id="closeModalBtn" class="modal-close">
                        <i class="fas fa-times"></i>

                    </button>
                </div>

                <form id="noteForm" class="moal-body">
                    <div class="form-group">
                        <label for="journalTitle" class="form-label">Title</label>
                        <input type="text" id="journalTitle" class="form-input" placeholder="Give it a name" required >
                    </div>

                    <div class="form-group">
                        <label for="JournalContent" class="form-label">Content</label>

                        <textarea id="journalContent" class="form-input form-textarea" placeholder="What's in your mind?" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tags</label>
                        <div class="tags-container">
                            <label class="tag-option">
                                <input type="radio"
                                       name="noteTag"
                                       value="work"
                                       class="tag-radio" >

                                       <span class="tag-label tag-work">
                                        <i class="fas fa-briefcase"></i> Work
                                       </span>
                            </label>

                            <label class="tag-option">
                                <input  type="radio"
                                        name="noteTag"
                                        value="personal"
                                        class="tag-radio" >

                            <span class="tag-label tag-personal">
                                <i class="fas fa-user"></i> Personal
                                   </span>
                            </label>

                            <label class="tag-option">

                                <input  type="radio"
                                        name="noteTag"
                                        value="ideas"
                                        class="tag-radio"
                                         checked>


                                <span class="tag-label tag-ideas">
                                    <i class="fas fa-lightbulb"></i> Ideas
                                </span>
                        
                            </label>

                            <label class="tag-option">
                  <input
                    type="radio"
                    name="noteTag"
                    value="reminders"
                    class="tag-radio"
                  />
                  <span class="tag-label tag-reminders">
                    <i class="fas fa-bell"></i> Reminder
                  </span>
                </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Save Journal</button>
                </form>
            </div>
        </div>

        <div id="confirmModal" class="modal-overlay">
            <div class="modal confirmation-modal">
                <div class="modal-body">
                    <p class="confirmation-text">
                        Are you sure you want to delete this journal?
                    </p>
                    <div class="confirmation-buttons">
                        <button id="cancelDeleteBtn" class="confirmation-btn cancal-btn">
                            Cancal
                        </button>

                        <button id="confirmDeleteBtn" class="confirmation-btn confirm-btn">
                            Delete
                        </button>

                    </div>
                </div>
            </div>
        </div>

    </div>



<!-- Js code for quotes  -->

    <script>
        const quotes = [
          "Small steps every day create meaningful change.",

"Your thoughts deserve a quiet place to rest.",

"Growth begins the moment you choose to reflect.",

"Write not to impress, but to understand.",

"Clarity often follows honesty.",

"A calm mind writes the clearest words.",

"Every page is a new beginning.",

"Reflection is the bridge between who you are and who you want to be.",

"Be patient with your own becoming.",

"Some answers only appear in silence.",

"Your inner world matters.",

"Progress is quiet, but powerful.",

"Balance is built in small daily choices.",

"Write your way through the noise.",

"Healing often starts with a single honest sentence.",

"Consistency shapes character.",

"Pause. Breathe. Reflect.",

"You are allowed to grow at your own pace.",

"Every thought written is a step toward clarity.",

"Today is another chance to realign",

    ];
const randomIndex = Math.floor(Math.random() * quotes.length);
document.getElementById("Quotes").innerText = quotes[randomIndex];

    </script>

    <script src="js/journal.js"></script>
</body>
</html>
